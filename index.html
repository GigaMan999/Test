<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>دفتر الملاحظات - سحابة الكتابة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease;
        }

        /* تأثيرات الخلفية للنهار */
        body {
            font-family: system-ui, 'Segoe UI', 'Tajawal', 'Roboto', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية النهار */
        body:not(.dark) {
            background: linear-gradient(135deg, #87CEEB 0%, #98D8E8 30%, #E0F6FF 100%);
        }

        /* خلفية الليل مع نجوم */
        body.dark {
            background: linear-gradient(145deg, #0a0f1a 0%, #0f1422 30%, #151c2c 100%);
        }

        /* النجوم - تظهر فقط في الوضع الليلي */
        body.dark .stars {
            display: block;
        }

        .stars {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* الغيوم - تظهر فقط في النهار */
        body:not(.dark) .clouds {
            display: block;
        }

        .clouds {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 1000px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            animation: floatCloud 40s linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }

        @keyframes floatCloud {
            from { transform: translateX(-20%); }
            to { transform: translateX(120%); }
        }

        /* الشمس (تأثير نهاري) */
        body:not(.dark) .sun-effect {
            display: block;
        }

        .sun-effect {
            display: none;
            position: fixed;
            top: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.6);
            animation: sunGlow 3s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes sunGlow {
            from { box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); transform: scale(1); }
            to { box-shadow: 0 0 80px rgba(255, 215, 0, 0.8); transform: scale(1.05); }
        }

        /* القمر (تأثير ليلي) */
        body.dark .moon-effect {
            display: block;
        }

        .moon-effect {
            display: none;
            position: fixed;
            top: 50px;
            right: 50px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #F9F3D9, #E8E0C5);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 245, 200, 0.5);
            pointer-events: none;
            z-index: 0;
        }

        :root {
            --bg-page: rgba(244, 247, 252, 0.85);
            --card-bg: rgba(255, 255, 255, 0.92);
            --text-primary: #1e2a3e;
            --text-secondary: #334e68;
            --border: rgba(220, 229, 239, 0.8);
            --input-bg: rgba(255, 255, 255, 0.95);
            --btn-primary: #2c7da0;
            --btn-primary-hover: #1f5e7a;
            --btn-secondary: rgba(233, 236, 239, 0.9);
            --btn-secondary-hover: #dce2e8;
            --danger: #e53e3e;
            --danger-hover: #c53030;
            --success: #2b9348;
            --success-hover: #1f723a;
            --warning: #e67e22;
            --warning-hover: #d35400;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --note-bg: rgba(254, 249, 227, 0.95);
        }

        body.dark {
            --bg-page: rgba(18, 24, 38, 0.88);
            --card-bg: rgba(30, 41, 59, 0.92);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e6;
            --border: rgba(45, 58, 78, 0.8);
            --input-bg: rgba(15, 23, 42, 0.95);
            --btn-secondary: rgba(51, 65, 85, 0.9);
            --btn-secondary-hover: #475569;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --note-bg: rgba(45, 42, 30, 0.95);
        }

        .app-container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: var(--shadow);
            padding: 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .theme-lang {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .icon-btn {
            background: var(--btn-secondary);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--btn-secondary-hover);
            transform: scale(0.97);
        }

        input, textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            border-color: var(--btn-primary);
            box-shadow: 0 0 0 2px rgba(44, 125, 160, 0.3);
        }

        button {
            background: var(--btn-primary);
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-warning {
            background: var(--warning);
        }

        .btn-warning:hover {
            background: var(--warning-hover);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
            margin-top: 1.5rem;
        }

        .note-card {
            background: var(--note-bg);
            border-radius: 1.5rem;
            padding: 1.25rem;
            border-right: 4px solid var(--btn-primary);
            word-wrap: break-word;
            white-space: pre-wrap;
            transition: 0.1s;
            backdrop-filter: blur(4px);
        }

        .note-text {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .note-date {
            font-size: 0.7rem;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .note-actions {
            display: flex;
            gap: 0.5rem;
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
        }

        .error-msg {
            color: var(--danger);
            background: rgba(229, 62, 62, 0.1);
            padding: 0.5rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .flex-btns {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        hr {
            margin: 1rem 0;
            border-color: var(--border);
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        .small-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
            border-radius: 1rem;
        }

        .edit-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .edit-modal {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow);
        }

        .edit-modal textarea {
            margin: 1rem 0;
            min-height: 150px;
        }

        .edit-modal-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        @media (max-width: 640px) {
            .card { padding: 1.25rem; }
            h2 { font-size: 1.4rem; }
        }

        /* زر التبديل - بدون علامة مائية */
        .themeToggle {
            --toggle-width: 60px;
            --toggle-height: 30px;
            --border-radius: 30px;
            background-color: #e0e5ec;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            width: var(--toggle-width);
            height: var(--toggle-height);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .themeToggleInput {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .themeToggle svg {
            width: 18px;
            height: 18px;
            transition: transform 0.4s ease;
            z-index: 2;
            color: #f1c40f;
        }

        body.dark .themeToggle svg {
            color: #f39c12;
            transform: rotate(180deg);
        }

        .themeToggle .sunMoon {
            fill: #f1c40f;
        }

        body.dark .themeToggle .sunMoon {
            fill: #f39c12;
        }

        .sunRay {
            fill: #f1c40f;
        }

        body.dark .sunRay {
            fill: #f39c12;
        }
    </style>
</head>
<body>
    <!-- عناصر الخلفية -->
    <div class="stars" id="starsContainer"></div>
    <div class="clouds" id="cloudsContainer"></div>
    <div class="sun-effect"></div>
    <div class="moon-effect"></div>
    
    <div class="app-container" id="appRoot"></div>

<script>
    const STORAGE_USERS = "secure_notes_users";
    const STORAGE_NOTES_PREFIX = "user_notes_";
    
    let currentUser = null;
    let currentLang = "ar";
    let isDark = false;
    
    // إنشاء النجوم
    function createStars() {
        const starsContainer = document.getElementById('starsContainer');
        if (!starsContainer) return;
        starsContainer.innerHTML = '';
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = Math.random() * 2 + 1 + 's';
            starsContainer.appendChild(star);
        }
    }
    
    // إنشاء الغيوم
    function createClouds() {
        const cloudsContainer = document.getElementById('cloudsContainer');
        if (!cloudsContainer) return;
        cloudsContainer.innerHTML = '';
        const cloudShapes = [
            { width: 120, height: 70, top: '10%', duration: 35, delay: 0 },
            { width: 180, height: 90, top: '25%', duration: 45, delay: 5 },
            { width: 100, height: 55, top: '45%', duration: 30, delay: 10 },
            { width: 150, height: 80, top: '65%', duration: 40, delay: 15 },
            { width: 90, height: 50, top: '80%', duration: 38, delay: 20 },
            { width: 200, height: 100, top: '5%', duration: 50, delay: 25 }
        ];
        
        cloudShapes.forEach((cloud) => {
            const cloudDiv = document.createElement('div');
            cloudDiv.className = 'cloud';
            cloudDiv.style.width = cloud.width + 'px';
            cloudDiv.style.height = cloud.height + 'px';
            cloudDiv.style.top = cloud.top;
            cloudDiv.style.left = -cloud.width + 'px';
            cloudDiv.style.animationDuration = cloud.duration + 's';
            cloudDiv.style.animationDelay = cloud.delay + 's';
            cloudDiv.style.opacity = 0.6 + Math.random() * 0.3;
            cloudDiv.style.position = 'absolute';
            cloudsContainer.appendChild(cloudDiv);
        });
    }
    
    const translations = {
        ar: {
            appTitle: "📝 دفتر السحابة",
            loginTitle: "تسجيل الدخول",
            username: "اسم المستخدم",
            password: "كلمة المرور",
            loginBtn: "دخول",
            noAccount: "ليس لديك حساب؟",
            registerNew: "تسجيل جديد",
            registerTitle: "إنشاء حساب جديد",
            registerBtn: "إنشاء حساب",
            backToLogin: "→ العودة لتسجيل الدخول",
            notePlaceholder: "اكتب ملاحظتك هنا... يمكنك كتابة نصوص طويلة جداً دون حدود حقيقية...",
            addNote: "+ إضافة ملاحظة",
            myNotes: "ملاحظاتي",
            logout: "🚪 تسجيل الخروج",
            welcome: "مرحباً",
            deleteNote: "حذف",
            editNote: "تعديل",
            save: "حفظ",
            cancel: "إلغاء",
            noNotes: "📭 لا توجد ملاحظات بعد. أضف ملاحظتك الأولى!",
            errorUserExists: "اسم المستخدم موجود مسبقاً! اختر اسماً آخر.",
            errorEmptyFields: "الرجاء ملء جميع الحقول.",
            errorWrongCreds: "اسم المستخدم أو كلمة المرور غير صحيحة.",
            allUsersList: "جميع المستخدمين المسجلين:",
            noteDeleted: "تم حذف الملاحظة",
            noteUpdated: "تم تحديث الملاحظة",
            langEn: "English",
            langAr: "العربية"
        },
        en: {
            appTitle: "📝 Cloud Notes",
            loginTitle: "Login",
            username: "Username",
            password: "Password",
            loginBtn: "Login",
            noAccount: "Don't have an account?",
            registerNew: "Sign Up",
            registerTitle: "Create New Account",
            registerBtn: "Register",
            backToLogin: "→ Back to Login",
            notePlaceholder: "Write your note here... You can write long texts without real limits...",
            addNote: "+ Add Note",
            myNotes: "My Notes",
            logout: "🚪 Logout",
            welcome: "Welcome",
            deleteNote: "Delete",
            editNote: "Edit",
            save: "Save",
            cancel: "Cancel",
            noNotes: "📭 No notes yet. Add your first note!",
            errorUserExists: "Username already exists! Choose another.",
            errorEmptyFields: "Please fill all fields.",
            errorWrongCreds: "Incorrect username or password.",
            allUsersList: "All registered users:",
            noteDeleted: "Note deleted",
            noteUpdated: "Note updated",
            langEn: "العربية",
            langAr: "English"
        }
    };
    
    function t(key) { return translations[currentLang][key] || key; }
    
    function updateDirAndLang() {
        const root = document.getElementById("appRoot");
        if (currentLang === "ar") {
            root.parentElement.setAttribute("dir", "rtl");
            root.parentElement.setAttribute("lang", "ar");
        } else {
            root.parentElement.setAttribute("dir", "ltr");
            root.parentElement.setAttribute("lang", "en");
        }
    }
    
    function applyTheme() {
        if (isDark) {
            document.body.classList.add("dark");
        } else {
            document.body.classList.remove("dark");
        }
        localStorage.setItem("app_theme", isDark ? "dark" : "light");
        
        if (isDark) {
            createStars();
        } else {
            createClouds();
        }
    }
    
    function loadSettings() {
        const savedTheme = localStorage.getItem("app_theme");
        isDark = savedTheme === "dark";
        const savedLang = localStorage.getItem("app_lang");
        currentLang = savedLang === "en" ? "en" : "ar";
        applyTheme();
        updateDirAndLang();
    }
    
    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem("app_lang", lang);
        updateDirAndLang();
        render();
    }
    
    function toggleTheme() {
        isDark = !isDark;
        applyTheme();
        render();
    }
    
    function getUsers() {
        const usersRaw = localStorage.getItem(STORAGE_USERS);
        if (!usersRaw) return [];
        try { return JSON.parse(usersRaw); } catch(e) { return []; }
    }
    
    function saveUsers(users) { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
    
    function registerUser(username, password) {
        if (!username || !password) return { success: false, msg: t("errorEmptyFields") };
        const users = getUsers();
        if (users.some(u => u.username === username)) return { success: false, msg: t("errorUserExists") };
        users.push({ username, password });
        saveUsers(users);
        const notesKey = STORAGE_NOTES_PREFIX + username;
        if (!localStorage.getItem(notesKey)) localStorage.setItem(notesKey, JSON.stringify([]));
        return { success: true };
    }
    
    function loginUser(username, password) {
        if (username === "999" && password === "999") {
            const allUsers = getUsers();
            let userListStr = allUsers.map(u => `${u.username} (pass: ${u.password})`).join("\n");
            if (allUsers.length === 0) userListStr = "لا يوجد مستخدمون مسجلون بعد.";
            alert(`[ADMIN] ${t("allUsersList")}\n${userListStr}`);
            console.table(allUsers);
            return { success: false, special: true };
        }
        const users = getUsers();
        const user = users.find(u => u.username === username && u.password === password);
        if (user) return { success: true, user };
        return { success: false, msg: t("errorWrongCreds") };
    }
    
    function getUserNotes(username) {
        const key = STORAGE_NOTES_PREFIX + username;
        const raw = localStorage.getItem(key);
        if (!raw) return [];
        try { return JSON.parse(raw); } catch(e) { return []; }
    }
    
    function saveUserNotes(username, notes) {
        const key = STORAGE_NOTES_PREFIX + username;
        localStorage.setItem(key, JSON.stringify(notes));
    }
    
    function addNote(username, text) {
        if (!text.trim()) return false;
        const notes = getUserNotes(username);
        notes.push({ id: Date.now() + Math.random() * 10000, text: text.trim(), createdAt: new Date().toISOString() });
        saveUserNotes(username, notes);
        return true;
    }
    
    function updateNote(username, noteId, newText) {
        if (!newText.trim()) return false;
        let notes = getUserNotes(username);
        const index = notes.findIndex(n => n.id == noteId);
        if (index !== -1) {
            notes[index].text = newText.trim();
            saveUserNotes(username, notes);
            return true;
        }
        return false;
    }
    
    function deleteNote(username, noteId) {
        let notes = getUserNotes(username);
        notes = notes.filter(n => n.id != noteId);
        saveUserNotes(username, notes);
        return true;
    }
    
    function render() {
        const root = document.getElementById("appRoot");
        if (!root) return;
        if (!currentUser) {
            root.innerHTML = renderAuthScreen();
            attachAuthEvents();
        } else {
            root.innerHTML = renderNotesDashboard();
            attachNotesEvents();
        }
        attachGlobalEvents();
    }
    
    function renderAuthScreen() {
        return `
            <div class="card" style="max-width: 500px; margin: 0 auto;">
                <div class="controls-bar" style="margin-bottom: 0.5rem;">
                    <h2>${t("appTitle")}</h2>
                    <div class="theme-lang">
                        <label for="globalThemeToggle" class="themeToggle">
                            <input type="checkbox" id="globalThemeToggle" class="themeToggleInput" ${isDark ? 'checked' : ''}>
                            <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" stroke="none">
                                <mask id="moon-mask">
                                    <rect x="0" y="0" width="20" height="20" fill="white"></rect>
                                    <circle cx="11" cy="3" r="8" fill="black"></circle>
                                </mask>
                                <circle class="sunMoon" cx="10" cy="10" r="8" mask="url(#moon-mask)"></circle>
                                <g>
                                    <circle class="sunRay sunRay1" cx="18" cy="10" r="1.5"></circle>
                                    <circle class="sunRay sunRay2" cx="14" cy="16.928" r="1.5"></circle>
                                    <circle class="sunRay sunRay3" cx="6" cy="16.928" r="1.5"></circle>
                                    <circle class="sunRay sunRay4" cx="2" cy="10" r="1.5"></circle>
                                    <circle class="sunRay sunRay5" cx="6" cy="3.1718" r="1.5"></circle>
                                    <circle class="sunRay sunRay6" cx="14" cy="3.1718" r="1.5"></circle>
                                </g>
                            </svg>
                        </label>
                        <button id="globalLangBtn" class="icon-btn">${currentLang === "ar" ? t("langEn") : t("langAr")}</button>
                    </div>
                </div>
                <div id="authDynamicForm">${renderLoginForm()}</div>
            </div>
        `;
    }
    
    function renderLoginForm() {
        return `
            <h3>${t("loginTitle")}</h3>
            <div style="margin: 1rem 0;"><input type="text" id="loginUsername" placeholder="${t("username")}" autocomplete="off" /></div>
            <div style="margin: 1rem 0;"><input type="password" id="loginPassword" placeholder="${t("password")}" /></div>
            <button id="doLoginBtn">${t("loginBtn")}</button>
            <div class="auth-switch"><p>${t("noAccount")} <button id="switchToRegisterBtn" class="icon-btn" style="background:transparent; color:var(--btn-primary);">${t("registerNew")}</button></p></div>
            <div id="authErrorMsg" class="error-msg"></div>
        `;
    }
    
    function renderRegisterForm() {
        return `
            <h3>${t("registerTitle")}</h3>
            <div style="margin: 1rem 0;"><input type="text" id="regUsername" placeholder="${t("username")}" autocomplete="off" /></div>
            <div style="margin: 1rem 0;"><input type="password" id="regPassword" placeholder="${t("password")}" /></div>
            <button id="doRegisterBtn">${t("registerBtn")}</button>
            <div class="auth-switch"><button id="switchToLoginBtn" class="icon-btn" style="background:transparent; color:var(--btn-primary);">${t("backToLogin")}</button></div>
            <div id="authErrorMsg" class="error-msg"></div>
        `;
    }
    
    function attachAuthEvents() {
        const loginBtn = document.getElementById("doLoginBtn");
        const switchReg = document.getElementById("switchToRegisterBtn");
        const switchLogin = document.getElementById("switchToLoginBtn");
        const registerBtn = document.getElementById("doRegisterBtn");
        
        if (loginBtn) {
            loginBtn.onclick = () => {
                const username = document.getElementById("loginUsername")?.value.trim();
                const password = document.getElementById("loginPassword")?.value;
                if (!username || !password) { showAuthError(t("errorEmptyFields")); return; }
                const res = loginUser(username, password);
                if (res.success) { currentUser = res.user; render(); }
                else if (!res.special) showAuthError(res.msg);
            };
        }
        if (switchReg) {
            switchReg.onclick = () => {
                const dynamicDiv = document.getElementById("authDynamicForm");
                if (dynamicDiv) dynamicDiv.innerHTML = renderRegisterForm();
                attachAuthEvents();
            };
        }
        if (switchLogin) {
            switchLogin.onclick = () => {
                const dynamicDiv = document.getElementById("authDynamicForm");
                if (dynamicDiv) dynamicDiv.innerHTML = renderLoginForm();
                attachAuthEvents();
            };
        }
        if (registerBtn) {
            registerBtn.onclick = () => {
                const username = document.getElementById("regUsername")?.value.trim();
                const password = document.getElementById("regPassword")?.value;
                if (!username || !password) { showAuthError(t("errorEmptyFields")); return; }
                const regRes = registerUser(username, password);
                if (regRes.success) {
                    const dynamicDiv = document.getElementById("authDynamicForm");
                    if (dynamicDiv) dynamicDiv.innerHTML = renderLoginForm();
                    attachAuthEvents();
                    showAuthError("✅ تم إنشاء الحساب بنجاح! سجل دخول الآن.", true);
                } else showAuthError(regRes.msg);
            };
        }
    }
    
    function showAuthError(msg, isSuccess = false) {
        const errDiv = document.getElementById("authErrorMsg");
        if (errDiv) {
            errDiv.innerText = msg;
            errDiv.style.color = isSuccess ? "var(--success)" : "var(--danger)";
            setTimeout(() => { if (errDiv) errDiv.innerText = ""; }, 3000);
        }
    }
    
    function renderNotesDashboard() {
        const notes = getUserNotes(currentUser.username);
        return `
            <div class="card">
                <div class="controls-bar">
                    <h2>${t("appTitle")}</h2>
                    <div class="theme-lang">
                        <label for="globalThemeToggle" class="themeToggle">
                            <input type="checkbox" id="globalThemeToggle" class="themeToggleInput" ${isDark ? 'checked' : ''}>
                            <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" stroke="none">
                                <mask id="moon-mask">
                                    <rect x="0" y="0" width="20" height="20" fill="white"></rect>
                                    <circle cx="11" cy="3" r="8" fill="black"></circle>
                                </mask>
                                <circle class="sunMoon" cx="10" cy="10" r="8" mask="url(#moon-mask)"></circle>
                                <g>
                                    <circle class="sunRay sunRay1" cx="18" cy="10" r="1.5"></circle>
                                    <circle class="sunRay sunRay2" cx="14" cy="16.928" r="1.5"></circle>
                                    <circle class="sunRay sunRay3" cx="6" cy="16.928" r="1.5"></circle>
                                    <circle class="sunRay sunRay4" cx="2" cy="10" r="1.5"></circle>
                                    <circle class="sunRay sunRay5" cx="6" cy="3.1718" r="1.5"></circle>
                                    <circle class="sunRay sunRay6" cx="14" cy="3.1718" r="1.5"></circle>
                                </g>
                            </svg>
                        </label>
                        <button id="globalLangBtn" class="icon-btn">${currentLang === "ar" ? t("langEn") : t("langAr")}</button>
                    </div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap:wrap; gap:10px;">
                    <div><strong>${t("welcome")} ${currentUser.username} ✨</strong></div>
                    <button id="logoutBtn" class="btn-danger">${t("logout")}</button>
                </div>
                <hr />
                <textarea id="newNoteText" rows="4" placeholder="${t("notePlaceholder")}"></textarea>
                <div style="margin-top: 0.8rem;"><button id="addNoteBtn" class="btn-success">${t("addNote")}</button></div>
                <h3 style="margin-top: 2rem;">📌 ${t("myNotes")}</h3>
                <div id="notesListContainer">${renderNotesList(notes)}</div>
            </div>
        `;
    }
    
    function renderNotesList(notes) {
        if (!notes.length) return `<div class="note-card" style="text-align:center;">${t("noNotes")}</div>`;
        const sorted = [...notes].reverse();
        return `<div class="notes-grid">` + sorted.map(note => `
            <div class="note-card" data-id="${note.id}">
                <div class="note-text">${escapeHtml(note.text)}</div>
                <div class="note-date">
                    <span>${new Date(note.createdAt).toLocaleString()}</span>
                    <div class="note-actions">
                        <button class="small-btn btn-warning edit-note-btn" data-id="${note.id}">${t("editNote")}</button>
                        <button class="small-btn btn-danger delete-note-btn" data-id="${note.id}">${t("deleteNote")}</button>
                    </div>
                </div>
            </div>
        `).join('') + `</div>`;
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showEditModal(noteId, currentText) {
        const modal = document.createElement('div');
        modal.className = 'edit-modal-overlay';
        modal.innerHTML = `
            <div class="edit-modal">
                <h3>${t("editNote")}</h3>
                <textarea id="editNoteText">${escapeHtml(currentText)}</textarea>
                <div class="edit-modal-buttons">
                    <button id="saveEditBtn" class="btn-success">${t("save")}</button>
                    <button id="cancelEditBtn" class="btn-secondary">${t("cancel")}</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const saveBtn = document.getElementById('saveEditBtn');
        const cancelBtn = document.getElementById('cancelEditBtn');
        const textarea = document.getElementById('editNoteText');
        
        const closeModal = () => modal.remove();
        
        saveBtn.onclick = () => {
            const newText = textarea.value;
            if (newText.trim()) {
                if (updateNote(currentUser.username, noteId, newText)) {
                    render();
                }
            }
            closeModal();
        };
        
        cancelBtn.onclick = closeModal;
        modal.onclick = (e) => { if (e.target === modal) closeModal(); };
    }
    
    function attachNotesEvents() {
        const addBtn = document.getElementById("addNoteBtn");
        const noteTextarea = document.getElementById("newNoteText");
        if (addBtn) {
            addBtn.onclick = () => {
                const text = noteTextarea?.value;
                if (text && text.trim()) {
                    addNote(currentUser.username, text);
                    noteTextarea.value = "";
                    render();
                } else alert("✏️ " + (currentLang === "ar" ? "لا يمكن إضافة ملاحظة فارغة!" : "Cannot add empty note!"));
            };
        }
        
        const logoutBtn = document.getElementById("logoutBtn");
        if (logoutBtn) {
            logoutBtn.onclick = () => { currentUser = null; render(); };
        }
        
        document.querySelectorAll(".delete-note-btn").forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const id = btn.getAttribute("data-id");
                if (id && confirm(currentLang === "ar" ? "هل أنت متأكد من الحذف؟" : "Are you sure to delete?")) {
                    deleteNote(currentUser.username, id);
                    render();
                }
            };
        });
        
        document.querySelectorAll(".edit-note-btn").forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const id = btn.getAttribute("data-id");
                const notes = getUserNotes(currentUser.username);
                const note = notes.find(n => n.id == id);
                if (note) showEditModal(id, note.text);
            };
        });
    }
    
    function attachGlobalEvents() {
        const themeToggle = document.getElementById("globalThemeToggle");
        if (themeToggle) {
            const newToggle = themeToggle.cloneNode(true);
            themeToggle.parentNode.replaceChild(newToggle, themeToggle);
            newToggle.onchange = (e) => { isDark = e.target.checked; applyTheme(); render(); };
        }
        const langBtn = document.getElementById("globalLangBtn");
        if (langBtn) {
            const newLangBtn = langBtn.cloneNode(true);
            langBtn.parentNode.replaceChild(newLangBtn, langBtn);
            newLangBtn.onclick = () => setLang(currentLang === "ar" ? "en" : "ar");
        }
    }
    
    function init() { 
        loadSettings(); 
        render();
        if (isDark) createStars();
        else createClouds();
    }
    init();
</script>
</body>
</html>
